# Full local stack in containers.
#
#   Spark pipeline + dbt -> `pipeline` and `dbt` services (image: docker/Dockerfile)
#   Orchestration        -> Airflow webserver + scheduler (image: docker/Dockerfile.airflow)
#   Airflow metadata     -> postgres
#
# Storage: bronze/silver/gold Delta + parquet exports go to the data-platform
# MinIO (s3a://${MINIO_BUCKET}/tapmad, reached as minio:9000 over the external
# `dataplatform-net`). The ./lakehouse bind mount now holds only the local
# landing files (the metastore is the shared HMS, the warehouse is on MinIO).
# Set MINIO_BUCKET / MINIO_ROOT_USER /
# MINIO_ROOT_PASSWORD (defaults: lakehouse / minioadmin / minioadmin).
#
# Common commands (see Makefile for shortcuts):
#   docker compose build
#   docker compose run --rm pipeline                 # generate->bronze->silver->gold->preview
#   docker compose run --rm dbt                       # register tables + dbt build (local spark target)
#   docker compose --profile airflow up -d            # Airflow UI at http://localhost:8080 (airflow/airflow)

x-pipeline-build: &pipeline-build
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment:
    # Full lakehouse on the data-platform MinIO (reachable as minio:9000 on the
    # shared external network). Set MINIO_BUCKET to your data-platform bucket.
    LAKEHOUSE_ROOT: s3a://${MINIO_BUCKET:-lakehouse}/tapmad
    LANDING_ROOT: /lakehouse/landing     # generator writes raw files here (local)
    MINIO_BUCKET: ${MINIO_BUCKET:-lakehouse}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    AWS_REGION: us-east-1
    PYTHONPATH: /app
    # dbt: default to the local spark-session target; override to `databricks`
    # and supply creds to hit a real warehouse.
    DBT_TARGET: ${DBT_TARGET:-local}
    DBT_INC_STRATEGY: ${DBT_INC_STRATEGY:-insert_overwrite}
    DATABRICKS_HOST: ${DATABRICKS_HOST:-}
    DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH:-}
    DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
  volumes:
    - .:/app                        # live code edits
    - ./lakehouse:/lakehouse        # local landing files only (data is on MinIO)
  networks:
    - default
    - dataplatform-net

services:
  # ---- one-shot: run the whole pipeline for one business date --------------
  pipeline:
    <<: *pipeline-build
    # default CMD (docker/run_pipeline.sh) comes from the image; pick a date with:
    #   docker compose run --rm -e BUSINESS_DATE=2024-02-01 -e N=500 pipeline

  # ---- one-shot: register tables + build the dbt marts + tests -------------
  dbt:
    <<: *pipeline-build
    working_dir: /app/dbt
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        python -m spark.register_tables &&
        dbt deps --project-dir /app/dbt --profiles-dir /app/dbt &&
        dbt build --project-dir /app/dbt --profiles-dir /app/dbt
        --target ${DBT_TARGET:-local}
        --vars '{business_date: 2024-01-15, dbt_incremental_strategy: ${DBT_INC_STRATEGY:-insert_overwrite}}' &&
        python -m spark.export_marts_parquet

  # ---- Airflow metadata DB -------------------------------------------------
  postgres:
    image: postgres:13
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ---- Airflow: one-time DB init + admin user ------------------------------
  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    profiles: ["airflow"]
    user: "0:0"          # root: chmod works on the Docker Desktop bind mount
    networks: &airflow-networks
      - default
      - dataplatform-net
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/repo/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # shared secret so the webserver can fetch task logs from the scheduler's
      # log server (the URLs are JWT-signed). Without one shared key each
      # container generates its own and the UI log view fails with
      # InvalidSignatureError.
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-tapmad-local-airflow-secret}
      # full lakehouse on MinIO (same as the pipeline/dbt services)
      LAKEHOUSE_ROOT: s3a://${MINIO_BUCKET:-lakehouse}/tapmad
      LANDING_ROOT: /lakehouse/landing
      MINIO_BUCKET: ${MINIO_BUCKET:-lakehouse}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION: us-east-1
      PYTHONPATH: /opt/airflow/repo
      # run as root (below) but keep HOME on the airflow user so the
      # pip-user-installed pyspark/delta/dbt + the Ivy jar cache still resolve.
      HOME: /home/airflow
      # dbt config for the DAG's dbt_build task (local spark target by default)
      DBT_PROFILES_DIR: /opt/airflow/repo/dbt
      DBT_TARGET: ${DBT_TARGET:-local}
      DBT_INC_STRATEGY: ${DBT_INC_STRATEGY:-insert_overwrite}
    volumes: &airflow-volumes
      - .:/opt/airflow/repo
      - ./lakehouse:/lakehouse
      - airflow-logs:/opt/airflow/logs
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        airflow db migrate &&
        airflow users create --username airflow --password airflow
        --firstname Syed --lastname Ismail --role Admin --email syedahmedismail98@gmail.com
        || true

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    profiles: ["airflow"]
    user: "0:0"
    networks: *airflow-networks
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    command: ["airflow", "webserver"]
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    profiles: ["airflow"]
    user: "0:0"
    networks: *airflow-networks
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    command: ["airflow", "scheduler"]
    restart: unless-stopped

volumes:
  pgdata:
  airflow-logs:

networks:
  default:
  # the data-platform MinIO lives here; create it once with:
  #   docker network create dataplatform-net
  dataplatform-net:
    external: true
