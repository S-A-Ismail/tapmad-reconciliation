# Spark defaults baked into the image. Any SparkSession created inside the
# container (the pipeline jobs AND dbt-spark's session method) picks these up
# via SPARK_CONF_DIR, so Delta + the local Hive metastore are configured once.

spark.master                                 local[*]

# Delta Lake + S3A (hadoop-aws 3.3.4 matches Spark 3.5.1's bundled Hadoop;
# it pulls aws-java-sdk-bundle transitively).
spark.sql.extensions                         io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog              org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.jars.packages                          io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4

# --- S3A -> MinIO (data-platform), reachable as minio:9000 on dataplatform-net.
# Edit the keys here if your MinIO root creds differ from minioadmin/minioadmin.
spark.hadoop.fs.s3a.endpoint                 http://minio:9000
spark.hadoop.fs.s3a.access.key               minioadmin
spark.hadoop.fs.s3a.secret.key               minioadmin
spark.hadoop.fs.s3a.path.style.access        true
spark.hadoop.fs.s3a.connection.ssl.enabled   false
spark.hadoop.fs.s3a.impl                     org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# Local Hive metastore (embedded Derby) so dbt can see the tables that
# register_tables.py registers. The metastore + managed-table warehouse stay
# LOCAL (Derby can't live on S3); only the bronze/silver/gold DATA goes to S3A
# via LAKEHOUSE_ROOT. Table metadata points at s3a:// locations.
spark.sql.catalogImplementation              hive
spark.sql.warehouse.dir                      /lakehouse/_warehouse
spark.hadoop.javax.jdo.option.ConnectionURL  jdbc:derby:;databaseName=/lakehouse/_metastore/metastore_db;create=true
spark.driver.extraJavaOptions                -Dderby.system.home=/lakehouse/_metastore

# dynamic partition overwrite so dbt's insert_overwrite replaces only the
# business_date partitions in the new data (per-day idempotency, not full-table)
spark.sql.sources.partitionOverwriteMode     dynamic

# keep local shuffles small
spark.sql.shuffle.partitions                 8
spark.ui.showConsoleProgress                 false
